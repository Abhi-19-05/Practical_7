<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apple Vision | Animated 3D Product Showcase</title>
    <style>
        /* Reset & Base Styles - Apple Inspired */
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            background-color: #000;
        }

        /* Canvas takes full screen */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* UI Overlay - Elegant floating text */
        .ui-container {
            position: absolute;
            bottom: 8%;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.4);
            padding: 20px 16px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            transition: opacity 0.5s ease;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 0.3px;
        }

        .instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .title { font-size: 1.2rem; }
            .subtitle { font-size: 0.7rem; }
            .instruction { font-size: 0.6rem; top: 12px; right: 12px; }
            .ui-container { bottom: 5%; padding: 12px 20px; }
        }

        /* subtle gradient overlay for depth */
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="gradient-overlay"></div>
    <div class="instruction">
        🖱️ Mouse / Finger moves → 3D rotation
    </div>
    <div class="ui-container">
        <div class="title">iPhone & AirPods Pro</div>
        <div class="subtitle">Spatial Audio. Seamless Magic.</div>
    </div>

    <!-- Import Three.js core and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Cameras, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // subtle depth fog

        // Camera: perspective for 3D objects
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 5);
        camera.lookAt(0, 0, 0);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // shadows for depth
        renderer.setClearColor(0x050b1a, 1);
        document.body.appendChild(renderer.domElement);

        // CSS2DRenderer for clean text labels (floating badge)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Lighting: dramatic, product-focused ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Key light: directional from upper left
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        // Fill light from right (warm)
        const fillLight = new THREE.PointLight(0xffaa66, 0.6);
        fillLight.position.set(2, 1, 3);
        scene.add(fillLight);
        
        // Back rim light (cool)
        const rimLight = new THREE.PointLight(0x66aaff, 0.8);
        rimLight.position.set(-1, 1.5, -3);
        scene.add(rimLight);
        
        // Additional soft fill from below
        const fillBottom = new THREE.PointLight(0x88aaff, 0.4);
        fillBottom.position.set(0, -1, 1);
        scene.add(fillBottom);
        
        // Dynamic mouse-controlled moving light (for interactive glow)
        const mouseLight = new THREE.PointLight(0xffaa55, 0.9);
        mouseLight.distance = 8;
        mouseLight.decay = 1.5;
        scene.add(mouseLight);
        
        // subtle spotlight on products
        const spot = new THREE.SpotLight(0xffffff, 0.5);
        spot.position.set(1, 2, 2);
        spot.castShadow = false;
        scene.add(spot);
        
        // --- Helper: reflective floor plane (transparent, glossy look) ---
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.85;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // A subtle glossy disc under objects
        const discGeometry = new THREE.CircleGeometry(1.6, 32);
        const discMaterial = new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.3, metalness: 0.7, transparent: true, opacity: 0.25 });
        const groundDisc = new THREE.Mesh(discGeometry, discMaterial);
        groundDisc.rotation.x = -Math.PI / 2;
        groundDisc.position.y = -0.82;
        scene.add(groundDisc);
        
        // --- Create Apple-style products ---
        // 1. iPhone (sleek rectangular body with glass finish)
        const phoneGroup = new THREE.Group();
        
        // Main body (dark titanium)
        const bodyGeo = new THREE.BoxGeometry(0.7, 0.08, 1.45);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2c2e3a, metalness: 0.85, roughness: 0.25, emissive: 0x111111 });
        const phoneBody = new THREE.Mesh(bodyGeo, bodyMat);
        phoneBody.castShadow = true;
        phoneBody.receiveShadow = false;
        phoneGroup.add(phoneBody);
        
        // Screen (glossy black with slight blue tint)
        const screenGeo = new THREE.BoxGeometry(0.62, 0.02, 1.35);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1a, metalness: 0.95, roughness: 0.12, emissive: 0x001133 });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.z = 0.03;
        screen.position.y = 0.045;
        phoneGroup.add(screen);
        
        // Camera bump (tiny circle)
        const cameraBumpGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.02, 24);
        const bumpMat = new THREE.MeshStandardMaterial({ color: 0xccaa88, metalness: 0.7, roughness: 0.3 });
        const cameraBump = new THREE.Mesh(cameraBumpGeo, bumpMat);
        cameraBump.position.set(0.25, 0.055, 0.68);
        cameraBump.rotation.x = 0;
        phoneGroup.add(cameraBump);
        
        // Side buttons (tiny)
        const buttonMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.5 });
        const volUp = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.08), buttonMat);
        volUp.position.set(0.38, 0.02, 0.3);
        phoneGroup.add(volUp);
        
        const volDown = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.08), buttonMat);
        volDown.position.set(0.38, -0.03, 0.3);
        phoneGroup.add(volDown);
        
        // Apple logo on back (CSS2D or small decal? use tiny metal disc)
        const logoMat = new THREE.MeshStandardMaterial({ color: 0xaaaaee, metalness: 0.9, emissive: 0x224466 });
        const logoDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.01, 16), logoMat);
        logoDisc.rotation.x = Math.PI / 2;
        logoDisc.position.set(0, -0.045, -0.55);
        phoneGroup.add(logoDisc);
        
        phoneGroup.position.set(-0.85, -0.2, 0);
        phoneGroup.rotation.y = -0.2;
        scene.add(phoneGroup);
        
        // 2. AirPods Buds (two sleek buds + charging case)
        const budsGroup = new THREE.Group();
        
        // Charging case (rounded pill)
        const caseGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.35, 32);
        const caseMat = new THREE.MeshStandardMaterial({ color: 0xe8eef2, metalness: 0.65, roughness: 0.3 });
        const chargingCase = new THREE.Mesh(caseGeo, caseMat);
        chargingCase.scale.set(0.9, 0.7, 1.1);
        chargingCase.position.y = -0.1;
        budsGroup.add(chargingCase);
        
        // Case lid accent
        const lidGeo = new THREE.SphereGeometry(0.48, 32, 16);
        const lidMat = new THREE.MeshStandardMaterial({ color: 0xf5f7fa, metalness: 0.7, roughness: 0.2 });
        const lid = new THREE.Mesh(lidGeo, lidMat);
        lid.scale.set(0.9, 0.2, 1.0);
        lid.position.y = 0.12;
        budsGroup.add(lid);
        
        // Left Bud: elegant stem + pod
        const leftBud = new THREE.Group();
        const stemGeo = new THREE.CylinderGeometry(0.08, 0.07, 0.45, 8);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0xf0f2f5, metalness: 0.8, roughness: 0.25 });
        const leftStem = new THREE.Mesh(stemGeo, stemMat);
        leftStem.position.y = -0.15;
        leftBud.add(leftStem);
        
        const podGeo = new THREE.SphereGeometry(0.17, 32, 32);
        const podMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.9, roughness: 0.15 });
        const leftPod = new THREE.Mesh(podGeo, podMat);
        leftPod.position.y = 0.12;
        leftPod.scale.set(1.1, 0.7, 0.9);
        leftBud.add(leftPod);
        
        // Grille detail
        const grilleMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const grille = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.03, 0.08), grilleMat);
        grille.position.set(0, 0.05, 0.18);
        leftPod.add(grille);
        
        leftBud.position.set(0.65, 0.05, 0.45);
        leftBud.rotation.z = -0.2;
        leftBud.rotation.x = 0.3;
        budsGroup.add(leftBud);
        
        // Right Bud
        const rightBud = new THREE.Group();
        const rightStem = new THREE.Mesh(stemGeo, stemMat);
        rightStem.position.y = -0.15;
        rightBud.add(rightStem);
        const rightPod = new THREE.Mesh(podGeo, podMat);
        rightPod.position.y = 0.12;
        rightPod.scale.set(1.1, 0.7, 0.9);
        rightBud.add(rightPod);
        const grilleR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.03, 0.08), grilleMat);
        grilleR.position.set(0, 0.05, 0.18);
        rightPod.add(grilleR);
        
        rightBud.position.set(-0.65, 0.05, 0.45);
        rightBud.rotation.z = 0.2;
        rightBud.rotation.x = 0.3;
        budsGroup.add(rightBud);
        
        budsGroup.position.set(0.85, -0.25, 0.15);
        budsGroup.rotation.y = 0.3;
        scene.add(budsGroup);
        
        // --- Additional floating particles for Apple "magic" ---
        const particleCount = 600;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 5 + 0.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 2;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({
            color: 0x77aaff,
            size: 0.03,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const particleSystem = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particleSystem);
        
        // Animated glowing rings around products (aura)
        const ringGeo = new THREE.TorusGeometry(0.95, 0.02, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x2266aa, transparent: true, opacity: 0.6 });
        const ring1 = new THREE.Mesh(ringGeo, ringMat);
        ring1.position.set(-0.85, -0.1, 0);
        ring1.rotation.x = Math.PI / 2;
        scene.add(ring1);
        
        const ring2 = new THREE.Mesh(ringGeo, ringMat);
        ring2.position.set(0.85, -0.1, 0.25);
        ring2.rotation.x = Math.PI / 2 + 0.2;
        ring2.scale.set(0.7, 0.7, 0.7);
        scene.add(ring2);
        
        // --- Mouse / Touch Interactive 3D Orientation ---
        // Target rotation angles (Yaw, Pitch)
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        
        // Variables for smooth follow
        let mouseXNormalized = 0;
        let mouseYNormalized = 0;
        
        // For device orientation fallback (mobile)
        let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        
        // Event listener for mouse move (desktop) and touch move (mobile)
        function handleMove(clientX, clientY) {
            // Normalize coordinates: -1 to 1 range (X: left -1, right 1; Y: top -1, bottom 1)
            const x = (clientX / window.innerWidth) * 2 - 1;
            const y = (clientY / window.innerHeight) * 2 - 1;
            // Map to rotation: max ±0.8 rad (~45 degrees) for dynamic but natural view
            targetRotationY = x * 0.7;   // yaw
            targetRotationX = y * 0.5;   // pitch
            // Update moving light position
            const lightX = (x * 2.5);
            const lightY = (-y * 1.8) + 0.5;
            mouseLight.position.set(lightX, lightY, 2.5);
        }
        
        window.addEventListener('mousemove', (e) => {
            handleMove(e.clientX, e.clientY);
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // For devices that support deviceorientation, add slight gyro effect (enhances 3D orientation)
        if (window.DeviceOrientationEvent && isMobile) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.beta !== null && e.gamma !== null) {
                    // gamma: left to right (-90 to 90), beta: front-back
                    const gamma = Math.min(Math.max(e.gamma / 45, -1), 1);
                    const beta = Math.min(Math.max(e.beta / 45, -0.8), 0.8);
                    targetRotationY = gamma * 0.6;
                    targetRotationX = beta * 0.4;
                    // Light follows device tilt as well
                    mouseLight.position.set(gamma * 2, -beta * 1.5 + 0.3, 2.2);
                }
            });
        }
        
        // Optional: subtle auto animation if idle (gentle breathing)
        let idleTimer;
        function resetIdle() {
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                // Gentle floating after 3 seconds of no interaction? but keep last orientation, just add micro motion
                // Not necessary, but we'll implement subtle default orbit drift after 5s? Actually not needed.
            }, 3000);
        }
        window.addEventListener('mousemove', resetIdle);
        window.addEventListener('touchstart', resetIdle);
        
        // --- Animation Loop & Smooth Camera Rotation ---
        // Also animate rings & particles & bud bounce
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Smooth interpolation for camera rotation (easing)
            currentRotationY += (targetRotationY - currentRotationY) * 0.08;
            currentRotationX += (targetRotationX - currentRotationX) * 0.08;
            
            // Apply rotation to camera around world Y and local X? For orbiting feel but keep products centered
            // We'll position camera in a spherical coordinate relative to center (0,0,0)
            const radius = 5.2;
            const baseYaw = currentRotationY;
            const basePitch = Math.min(Math.max(currentRotationX, -0.6), 0.6);
            
            const camX = Math.sin(baseYaw) * radius * 0.8;
            const camZ = Math.cos(baseYaw) * radius;
            const camY = 1.2 + basePitch * 1.5;
            
            camera.position.x = camX;
            camera.position.y = camY;
            camera.position.z = camZ;
            camera.lookAt(0, 0.1, 0);
            
            // Dynamic product floating animation (subtle hover)
            phoneGroup.position.y = -0.2 + Math.sin(time * 2.5) * 0.008;
            budsGroup.position.y = -0.25 + Math.cos(time * 2.2) * 0.008;
            // Buds slight rotation sway
            budsGroup.rotation.z = 0.25 + Math.sin(time * 1.8) * 0.03;
            phoneGroup.rotation.z = -0.15 + Math.cos(time * 2.0) * 0.02;
            
            // Rotate rings
            ring1.rotation.z += 0.008;
            ring2.rotation.x = Math.PI / 2 + 0.2 + Math.sin(time) * 0.1;
            ring2.rotation.z += 0.005;
            
            // Particle animation: gentle drifting
            particleSystem.rotation.y += 0.001;
            particleSystem.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // Update mouse light color shifting with time
            const hue = (time * 0.1) % 1;
            mouseLight.intensity = 0.7 + Math.sin(time * 2) * 0.2;
            
            // Add a subtle glow effect to screen emissive
            screenMat.emissiveIntensity = 0.2 + Math.sin(time * 3) * 0.05;
            
            // Render
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Add a small floating CSS2D label for "AirPods Pro" and "iPhone"
        const makeLabel = (text, color, position) => {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = '500';
            div.style.background = 'rgba(20,20,40,0.7)';
            div.style.backdropFilter = 'blur(8px)';
            div.style.padding = '4px 12px';
            div.style.borderRadius = '20px';
            div.style.border = '0.5px solid rgba(255,255,255,0.2)';
            div.style.fontFamily = 'inherit';
            div.style.letterSpacing = '0.5px';
            const label = new CSS2DObject(div);
            label.position.copy(position);
            scene.add(label);
        };
        
        makeLabel('iPhone 15 Pro', '#ffffff', new THREE.Vector3(-0.85, 0.35, 0));
        makeLabel('AirPods Pro 2', '#ffffff', new THREE.Vector3(0.85, 0.25, 0.45));
        
        // Tiny glowing stars effect (extra sparkle)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 400;
        const starPositionsArray = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositionsArray[i*3] = (Math.random() - 0.5) * 80;
            starPositionsArray[i*3+1] = (Math.random() - 0.5) * 30;
            starPositionsArray[i*3+2] = (Math.random() - 0.5) * 40 - 20;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositionsArray, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.05, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeometry, starMat);
        scene.add(stars);
        
        // Initial orientation hint: slight rotation on load
        setTimeout(() => {
            targetRotationY = 0.15;
            targetRotationX = 0.05;
        }, 100);
        
        console.log('Apple-style 3D experience ready — mouse moves the world');
    </script>
</body>
</html>
